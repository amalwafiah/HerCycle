<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HerCycle — Track Your Cycle</title>
    <meta
      name="description"
      content="Track your menstrual cycle, predict your next period, log symptoms, moods, and notes with HerCycle."
    />
    <link rel="stylesheet" href="./calender.css" />
  </head>
  <body>
    <main class="page">
      <div class="container">
        <!-- Header -->
        <header class="card header">
          <h1 class="title">
            TRACK YOUR CYCLE
            <span class="droplet" aria-hidden="true">💧</span>
          </h1>

          <div class="controls">
            <label class="field">
              <span class="field-label">Last period start date</span>
              <div class="pill" data-tooltip="Select the first day of your last period.">
                <input type="date" id="lastPeriod" />
              </div>
            </label>

            <label class="field">
              <span class="field-label">Cycle length</span>
              <div class="pill" data-tooltip="Choose your average menstrual cycle length.">
                <select id="cycleLength"></select>
              </div>
            </label>

            <label class="field">
              <span class="field-label">Period duration</span>
              <div class="pill" data-tooltip="Choose how many days your period lasts.">
                <select id="periodDuration"></select>
              </div>
            </label>

            <button type="button" id="applyBtn" class="apply-btn" aria-label="Apply" data-tooltip="Apply changes and update the calendar.">SAVE</button>
          </div>

          <p class="next-period">
            Next predicted period:
            <span class="next-period-date" id="nextPeriodDate"></span>
          </p>
        </header>

        <!-- Main grid -->
        <section class="grid">
          <!-- Cycle Calendar -->
          <div class="card calendar-card">
            <h2 class="section-title">MY CYCLE CALENDAR</h2>

            <div class="month-nav">
              <button id="prevMonth" class="icon-btn" aria-label="Previous month">‹</button>
              <span id="monthLabel" class="month-label"></span>
              <button id="nextMonth" class="icon-btn" aria-label="Next month">›</button>
            </div>

            <div class="legend">
              <span class="legend-item">
                <span class="dot dot-period"></span> Period
              </span>
              <button id="todayBtn" class="today-btn" data-tooltip="Jump back to the current month.">TODAY</button>
              <span class="legend-item">
                <span class="dot dot-next"></span> Next Period
              </span>
            </div>

            <div class="weekdays">
              <div>MON</div><div>TUE</div><div>WED</div>
              <div>THU</div><div>FRI</div><div>SAT</div><div>SUN</div>
            </div>
            <div class="days" id="days"></div>
          </div>

          <!-- Daily Log Panel -->
          <aside class="card log-panel">
            <button type="button" id="dateBtn" class="date-btn" data-tooltip="Select the date for today’s log.">
              <span id="dateLabel"></span> 📅
            </button>

            <section>
              <h3 class="section-subtitle">RECORD SYMPTOMS</h3>
              <div class="symptoms" id="symptoms"></div>
            </section>

            <section>
              <h3 class="section-subtitle">TODAY'S MOOD</h3>
              <div class="moods" id="moods"></div>
            </section>

            <section class="notes-section">
              <h3 class="section-subtitle">ADD NOTES</h3>
              <textarea
                id="notes"
                maxlength="1000"
                placeholder="Type something here..."
              ></textarea>
            </section>

            <button id="saveBtn" class="save-btn" data-tooltip="Save your daily symptoms, mood, and notes.">SAVE</button>
          </aside>
        </section>

        <!-- Bottom Nav -->
        <nav class="bottom-nav">
      <button class="nav-item active" data-nav="home">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l9 8h-3v9h-4v-6h-4v6H6v-9H3z"/></svg>
        <span>Home</span>
      </button>
      <!-- line 69 tells JS "when clicked, go to homescreen
         svg tags are ICONS
         line 69 makes the Home button pink initially-->
      <button class="nav-item" data-nav="calendar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
        <span>Calendar</span>
      </button>
      
      <button class="nav-item" data-nav="selfcare">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-4.5-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 11c0 5.5-7 10-7 10z"/></svg>
        <span>Self-care</span>
      </button>
      
      <button class="nav-item" data-nav="profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-4 5-6 8-6s6.5 2 8 6"/></svg>
        <span>Profile</span>
      </button>
    </nav>
      </div>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="./calender.js" defer></script>
  </body>
</html>
